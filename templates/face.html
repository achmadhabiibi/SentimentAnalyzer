<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Mood Detector</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2e3349;
    --accent: #6c63ff;
    --pos: #34d399;
    --neg: #f87171;
    --neu: #94a3b8;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d27, #12142e);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 700; }
  .nav-links { display: flex; gap: 12px; }
  .nav-links a {
    color: var(--muted); font-size: 0.85rem; text-decoration: none;
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 8px;
    transition: all .2s;
  }
  .nav-links a:hover, .nav-links a.active { background: var(--accent); color: white; border-color: var(--accent); }

  main { max-width: 960px; margin: 36px auto; padding: 0 20px 60px; }

  .section-title {
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
  }

  /* Status bar */
  #statusBar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  .dot.ready { background: var(--pos); }
  .dot.error { background: var(--neg); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Camera layout */
  .camera-wrap {
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid var(--border);
    aspect-ratio: 16/9;
    max-height: 420px;
    margin-bottom: 20px;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  /* Mood result */
  .mood-card {
    border-radius: var(--radius);
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    transition: all .4s ease;
    border: 2px solid var(--border);
    background: var(--surface);
  }
  .mood-card.POSITIF  { background: linear-gradient(135deg,#064e3b,#065f46); border-color: #34d399; }
  .mood-card.NEGATIF  { background: linear-gradient(135deg,#4c0519,#7f1d1d); border-color: #f87171; }
  .mood-card.NETRAL   { background: linear-gradient(135deg,#1e293b,#0f172a); border-color: #475569; }
  .mood-card.WAITING  { border-style: dashed; }

  .mood-emoji { font-size: 3.5rem; transition: all .3s; }
  .mood-info h2 { font-size: 1.8rem; font-weight: 800; }
  .mood-info p  { color: rgba(255,255,255,.6); font-size: 0.9rem; margin-top: 4px; }
  .color-POSITIF { color: var(--pos); }
  .color-NEGATIF { color: var(--neg); }
  .color-NETRAL  { color: var(--neu); }
  .color-WAITING { color: var(--muted); }

  /* Emotion bars */
  .emotions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .emo-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .emo-bar label { font-size: 0.78rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 6px; }
  .emo-bar label span { color: var(--text); font-weight: 600; }
  .emo-track { background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; }
  .emo-fill  { height: 100%; border-radius: 99px; transition: width .4s ease; }
  .emo-happy    .emo-fill { background: #34d399; }
  .emo-sad      .emo-fill { background: #60a5fa; }
  .emo-angry    .emo-fill { background: #f87171; }
  .emo-fearful  .emo-fill { background: #c084fc; }
  .emo-disgusted .emo-fill { background: #fb923c; }
  .emo-surprised .emo-fill { background: #fbbf24; }
  .emo-neutral  .emo-fill { background: #94a3b8; }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn {
    padding: 11px 24px; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: white; flex: 1; }
  .btn-primary:hover { background: #5a52e0; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #4c0519; color: #f87171; border: 1px solid #f87171; }
  .btn-danger:hover { background: #7f1d1d; }

  /* History */
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .history-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; display: flex; align-items: center; gap: 12px; font-size: 0.85rem;
  }
  .h-badge {
    padding: 3px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
  }
  .h-badge.POSITIF { background: rgba(52,211,153,.15); color: var(--pos); }
  .h-badge.NEGATIF { background: rgba(248,113,113,.15); color: var(--neg); }
  .h-badge.NETRAL  { background: rgba(148,163,184,.1);  color: var(--neu); }

  .placeholder-cam {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; color: var(--muted);
  }
  .placeholder-cam .icon { font-size: 3rem; margin-bottom: 10px; }

  @media(max-width:600px) {
    header { flex-direction: column; gap: 10px; }
    .emotions-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Sentiment Analyzer</div>
  <div class="nav-links">
    <a href="/">✍️ Teks</a>
    <a href="/face" class="active">📷 Wajah</a>
    <a href="/docs" target="_blank">📖 API</a>
  </div>
</header>

<main>
  <!-- Status -->
  <div id="statusBar">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">Memuat model AI deteksi wajah...</span>
  </div>

  <!-- Camera -->
  <div class="section-title">📷 Kamera Live</div>
  <div class="camera-wrap" id="cameraWrap">
    <div class="placeholder-cam" id="placeholder">
      <div class="icon">📷</div>
      <div>Klik "Mulai Kamera" untuk memulai</div>
    </div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="startCamera()">▶ Mulai Kamera</button>
    <button class="btn btn-danger" id="stopBtn" onclick="stopCamera()" style="display:none">⏹ Stop</button>
    <button class="btn btn-secondary" onclick="clearHistory()">🗑 Hapus Riwayat</button>
  </div>

  <!-- Mood Result -->
  <div class="section-title">😊 Mood Terdeteksi</div>
  <div class="mood-card WAITING" id="moodCard">
    <div class="mood-emoji" id="moodEmoji">🎭</div>
    <div class="mood-info">
      <h2 class="color-WAITING" id="moodLabel">Menunggu...</h2>
      <p id="moodSub">Nyalakan kamera dan hadapkan wajah ke kamera</p>
    </div>
  </div>

  <!-- Emotion Bars -->
  <div class="section-title">📊 Detail Emosi</div>
  <div class="emotions-grid">
    <div class="emo-bar emo-happy">
      <label>😊 Senang <span id="pct-happy">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-happy" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-sad">
      <label>😢 Sedih <span id="pct-sad">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-sad" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-angry">
      <label>😠 Marah <span id="pct-angry">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-angry" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-fearful">
      <label>😨 Takut <span id="pct-fearful">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-fearful" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-disgusted">
      <label>🤢 Jijik <span id="pct-disgusted">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-disgusted" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-surprised">
      <label>😲 Kaget <span id="pct-surprised">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-surprised" style="width:0%"></div></div>
    </div>
    <div class="emo-bar emo-neutral" style="grid-column: span 2">
      <label>😐 Netral <span id="pct-neutral">0%</span></label>
      <div class="emo-track"><div class="emo-fill" id="bar-neutral" style="width:0%"></div></div>
    </div>
  </div>

  <!-- History -->
  <div class="section-title">🕐 Riwayat Deteksi</div>
  <div class="history-list" id="historyList">
    <div style="color:var(--muted);font-size:.85rem;padding:10px">Belum ada riwayat...</div>
  </div>
</main>

<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
let stream = null;
let detectionLoop = null;
let modelsLoaded = false;
let history = [];

const video    = document.getElementById('video');
const overlay  = document.getElementById('overlay');
const ctx      = overlay.getContext('2d');

// ── Load Models ──────────────────────────────────────────────────────────────
async function loadModels() {
  setStatus('loading', 'Memuat model AI deteksi wajah (pertama kali mungkin lambat)...');
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
    modelsLoaded = true;
    setStatus('ready', '✅ Model siap — klik "Mulai Kamera" untuk memulai');
    document.getElementById('startBtn').disabled = false;
  } catch(e) {
    setStatus('error', '❌ Gagal memuat model: ' + e.message + ' — coba refresh halaman');
    console.error(e);
  }
}

function setStatus(type, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'dot ' + type;
  text.textContent = msg;
}

// ── Camera ───────────────────────────────────────────────────────────────────
async function startCamera() {
  if (!modelsLoaded) { alert('Model belum siap, tunggu sebentar!'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 1280 }, audio: false });
    video.srcObject = stream;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    setStatus('ready', '📷 Kamera aktif — mendeteksi ekspresi wajah...');
    video.addEventListener('playing', startDetection, { once: true });
  } catch(e) {
    setStatus('error', '❌ Tidak bisa akses kamera: ' + e.message);
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (detectionLoop) { clearInterval(detectionLoop); detectionLoop = null; }
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  setStatus('ready', '⏹ Kamera dimatikan');
  resetMoodCard();
}

// ── Detection Loop ───────────────────────────────────────────────────────────
function startDetection() {
  overlay.width  = video.videoWidth;
  overlay.height = video.videoHeight;

  detectionLoop = setInterval(async () => {
    if (!stream) return;
    try {
      const result = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
        .withFaceExpressions();

      ctx.clearRect(0, 0, overlay.width, overlay.height);

      if (!result) {
        setMoodCard('WAITING', '🎭', 'Tidak ada wajah', 'Hadapkan wajah ke kamera');
        return;
      }

      drawFaceBox(result);
      updateEmotionBars(result.expressions);
      const mood = classifyMood(result.expressions);
      setMoodCard(mood.label, mood.emoji, mood.labelID, mood.desc);
      addHistory(mood);

    } catch(e) { console.warn(e); }
  }, 400);
}

function drawFaceBox(result) {
  const box = result.detection.box;
  const ex  = result.expressions;
  const mood = classifyMood(ex);

  const colors = { POSITIF: '#34d399', NEGATIF: '#f87171', NETRAL: '#94a3b8', WAITING: '#64748b' };
  const c = colors[mood.label] || '#64748b';

  ctx.strokeStyle = c;
  ctx.lineWidth   = 3;
  ctx.shadowColor = c;
  ctx.shadowBlur  = 12;
  ctx.strokeRect(box.x, box.y, box.width, box.height);
  ctx.shadowBlur  = 0;

  // Label above box
  ctx.fillStyle = c;
  ctx.font = 'bold 18px Segoe UI';
  ctx.fillText(`${mood.emoji} ${mood.labelID}`, box.x + 4, box.y - 8);
}

// ── Mood Classification ───────────────────────────────────────────────────────
function classifyMood(ex) {
  const positiveScore = (ex.happy || 0) + (ex.surprised || 0) * 0.3;
  const negativeScore = (ex.angry  || 0) + (ex.sad || 0) + (ex.fearful || 0) + (ex.disgusted || 0);
  const neutralScore  = ex.neutral || 0;

  const topEmotion = Object.entries(ex).sort((a,b) => b[1]-a[1])[0][0];
  const conf = Math.round(Math.max(positiveScore, negativeScore, neutralScore) * 100);

  if (topEmotion === 'happy' || (positiveScore > negativeScore && positiveScore > neutralScore)) {
    return { label:'POSITIF', labelID:'POSITIF', emoji:'😊', desc:`Wajah kamu terdeteksi ${getTopEmoji(ex)} — Kepercayaan: ${conf}%` };
  } else if (negativeScore > positiveScore && negativeScore > neutralScore * 0.6) {
    const negLabel = topEmotion === 'angry' ? 'Marah 😠' : topEmotion === 'sad' ? 'Sedih 😢' : topEmotion === 'fearful' ? 'Takut 😨' : 'Negatif';
    return { label:'NEGATIF', labelID:'NEGATIF', emoji:'😔', desc:`Ekspresi terdeteksi: ${negLabel} — Kepercayaan: ${conf}%` };
  } else {
    return { label:'NETRAL', labelID:'NETRAL', emoji:'😐', desc:`Ekspresi wajah netral/diam — Kepercayaan: ${conf}%` };
  }
}

function getTopEmoji(ex) {
  const map = { happy:'senang 😊', surprised:'kaget 😲', neutral:'netral 😐', sad:'sedih 😢', angry:'marah 😠', fearful:'takut 😨', disgusted:'jijik 🤢' };
  const top = Object.entries(ex).sort((a,b) => b[1]-a[1])[0][0];
  return map[top] || top;
}

// ── UI Updates ────────────────────────────────────────────────────────────────
function setMoodCard(label, emoji, labelText, desc) {
  const card  = document.getElementById('moodCard');
  const emoEl = document.getElementById('moodEmoji');
  const lblEl = document.getElementById('moodLabel');
  const subEl = document.getElementById('moodSub');

  card.className  = 'mood-card ' + label;
  emoEl.textContent = emoji;
  lblEl.textContent = labelText;
  lblEl.className   = 'color-' + label;
  subEl.textContent = desc;
}

function resetMoodCard() {
  setMoodCard('WAITING', '🎭', 'Menunggu...', 'Nyalakan kamera dan hadapkan wajah ke kamera');
}

function updateEmotionBars(ex) {
  const keys = ['happy','sad','angry','fearful','disgusted','surprised','neutral'];
  keys.forEach(k => {
    const pct = Math.round((ex[k] || 0) * 100);
    document.getElementById('bar-' + k).style.width = pct + '%';
    document.getElementById('pct-' + k).textContent  = pct + '%';
  });
}

// ── History ───────────────────────────────────────────────────────────────────
let lastLabel = null;
function addHistory(mood) {
  if (mood.label === lastLabel || mood.label === 'WAITING') return;
  lastLabel = mood.label;

  const now = new Date().toLocaleTimeString('id');
  history.unshift({ label: mood.label, emoji: mood.emoji, labelID: mood.labelID, time: now });
  if (history.length > 30) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:10px">Belum ada riwayat...</div>'; return; }
  el.innerHTML = history.map(h =>
    `<div class="history-item">
      <span class="h-badge ${h.label}">${h.emoji} ${h.labelID}</span>
      <span style="flex:1;color:var(--muted)">${h.time}</span>
    </div>`
  ).join('');
}

function clearHistory() {
  history = []; lastLabel = null; renderHistory();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').disabled = true;
window.addEventListener('load', loadModels);
</script>
</body>
</html>
